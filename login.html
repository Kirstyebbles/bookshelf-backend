<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />

<title>Track Your Books</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  font-family:'Poppins',sans-serif;
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  background:linear-gradient(135deg,#ffe4ec,#fff0f5);
}

.login-box{
  width:350px;
  background:rgba(255,255,255,0.9);
  padding:35px;
  border-radius:25px;
  backdrop-filter:blur(10px);
  box-shadow:0 10px 30px rgba(255,105,180,0.2);
  text-align:center;
}

.login-box h1{
  color:#ff1493;
  margin-bottom:10px;
}

.login-box p{
  color:#ff69b4;
  margin-bottom:25px;
}

button{
  width:100%;
  padding:12px;
  border:none;
  border-radius:12px;
  background:linear-gradient(135deg,#ff69b4,#ff1493);
  color:white;
  font-size:1rem;
  font-weight:bold;
  cursor:pointer;
  transition:0.3s;
  margin-top:15px;
}

button:hover{
  transform:scale(1.03);
  box-shadow:0 5px 15px rgba(255,20,147,0.3);
}

.hidden{
  display:none;
}

.welcome-text{
  font-size:1.4rem;
  color:#ff1493;
  margin-bottom:20px;
}

</style>
</head>

<body>

<div class="login-box">

<h1>Welcome</h1>

<p>Login to your Book Tracker</p>



<div id="login-screen">

<button type="button" id="login-btn">
  Login with Google
</button>

</div>


<div class="hidden" id="profile-screen">

<h2 class="welcome-text">
  Hello <span id="user-name"></span> 👋
</h2>

<button type="button" id="logout-btn">
  Logout
</button>

</div>

</div>

<script type="module" src="main.js"></script>

</body>
</html>
