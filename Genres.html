<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>🎭 Genre Tracker</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>
body{
  font-family:'Poppins',sans-serif;
  margin:0;
  background:linear-gradient(135deg,#ffe4ec,#fff0f5);
}


header{
  background:linear-gradient(135deg,#ff69b4,#ff1493);
  color:white;
  text-align:center;
  padding:1.5rem;
  box-shadow:0 4px 15px rgba(255,105,180,0.3);
}


.container{
  max-width:900px;
  margin:30px auto;
  background:rgba(255,255,255,0.9);
  padding:25px;
  border-radius:25px;
  box-shadow:0 10px 30px rgba(255,105,180,0.15);
}


.dashboard{
  display:flex;
  gap:15px;
  margin-bottom:25px;
  flex-wrap:wrap;
}

.card{
  flex:1;
  min-width:220px;
  background:#fff0f5;
  padding:20px;
  border-radius:20px;
  text-align:center;
  box-shadow:0 5px 15px rgba(255,105,180,0.15);
  transition:0.3s;
}

.card:hover{
  transform:translateY(-5px) scale(1.03);
}

.card p{
  margin:0;
  color:#ff1493;
  font-weight:600;
}

.card h3{
  margin-top:10px;
  color:#ff69b4;
  font-size:2rem;
}

/* Form */
form{
  display:flex;
  gap:10px;
  flex-wrap:wrap;
  margin-bottom:25px;
}

input,
select,
button{
  padding:12px;
  border-radius:10px;
  border:1px solid #ffc0cb;
  font-family:'Poppins';
}

input,
select{
  flex:1;
}

button{
  background:linear-gradient(135deg,#ff69b4,#ff1493);
  color:white;
  border:none;
  cursor:pointer;
  transition:0.3s;
  font-weight:bold;
}

button:hover{
  transform:scale(1.05);
  box-shadow:0 5px 15px rgba(255,20,147,0.3);
}

/* Book List */
.book{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:15px;
  border-bottom:1px solid #ffe4e1;
  animation:fadeUp 0.4s ease;
}

.genre-tag{
  background:#ffc0cb;
  padding:5px 12px;
  border-radius:20px;
  font-size:0.8rem;
  color:#ff1493;
  font-weight:600;
}

</style>
</head>

<body>

<header>
<h1>Genre Tracker</h1>
</header>
  <nav style="background:#ed76df; padding:15px; position:sticky; top:0; z-index:1000;">
  <div style="max-width:1100px; margin:auto; display:flex; justify-content:space-between; align-items:center; color:white;">
    <strong>Log In</strong>
    <div>
       <a href="index.html" style="color:white; margin:0 10px; text-decoration:none;">Home</a>
      <a href="favourites.html" style="color:white; margin:0 10px; text-decoration:none;">Favourites</a>
      <a href="wishlist.html" style="color:white; margin:0 10px; text-decoration:none;">Wishlist</a>
    </div>
  </div>
</nav>

<div class="container">

<div class="dashboard">

<div class="card">
<p>Most Popular Genre</p>
<h3 id="topGenre">-</h3>
</div>

<div class="card">
<p>Total Genre Entries</p>
<h3 id="totalGenres">0</h3>
</div>

</div>

<h2>Add Book by Genre</h2>

<form id="genreForm">

<input
id="title"
placeholder="Book Title"
required
>

<select id="genre">

<option value="Fantasy">Fantasy</option>

<option value="Romance">Romance</option>

<option value="Thriller">Thriller</option>

<option value="Sci-Fi">Sci-Fi</option>

<option value="Horror">Horror</option>

<option value="Mystery">Mystery</option>

<option value="Other">Other</option>

</select>

<button>Add</button>

</form>


<div id="list"></div>

</div>

<script>
const form = document.getElementById('genreForm');
const list = document.getElementById('list');

let books =
JSON.parse(localStorage.getItem('genres_page_only'))
|| [];

/* Save */
function save(){
  localStorage.setItem(
    'genres_page_only',
    JSON.stringify(books)
  );
}

/* Render */
function render(){

  list.innerHTML = '';

  books.forEach((b,i)=>{

    const div = document.createElement('div');

    div.className = 'book';

    div.innerHTML = `
      <div>
        <strong>${b.title}</strong>

        <span class="genre-tag">
          ${b.genre}
        </span>
      </div>

      <button onclick="removeBook(${i})">
        Remove
      </button>
    `;

    list.appendChild(div);

  });

  updateDashboard();
}

/* Dashboard */
function updateDashboard(){

  const counts = {};

  books.forEach(b=>{

    counts[b.genre] =
    (counts[b.genre] || 0) + 1;

  });

  let topGenre = '-';
  let max = 0;

  Object.keys(counts).forEach(g=>{

    if(counts[g] > max){

      max = counts[g];
      topGenre = g;

    }

  });

  document.getElementById('topGenre')
  .textContent = topGenre;

  document.getElementById('totalGenres')
  .textContent = books.length;
}

/* Remove */
function removeBook(i){

  books.splice(i,1);

  save();

  render();
}

/* Add */
form.onsubmit = (e)=>{

  e.preventDefault();

  const book = {

    title:title.value,

    genre:genre.value

  };

  books.push(book);

  save();

  render();

  form.reset();
};


render();
</script>

</body>
</html>
