
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Track Your Books</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body {
      background: #050816;
      color: white;
      min-height: 100vh;
      padding: 40px 20px;
      background-image:
        radial-gradient(circle at top left, rgba(0,255,255,0.15), transparent 30%),
        radial-gradient(circle at bottom right, rgba(0,128,255,0.15), transparent 30%);
    }

    .container {
      max-width: 900px;
      margin: auto;
    }

    h1 {
      font-size: 42px;
      margin-bottom: 10px;
      text-align: center;
      color: #00d4ff;
      text-shadow: 0 0 15px rgba(0,212,255,0.6);
    }

    p.subtitle {
      text-align: center;
      color: #9aa4c2;
      margin-bottom: 40px;
    }

    .add-book-card {
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 20px;
      padding: 25px;
      margin-bottom: 40px;
      backdrop-filter: blur(10px);
      box-shadow: 0 0 25px rgba(0,212,255,0.08);
    }

    .form-grid {
      display: grid;
      grid-template-columns: 1fr 1fr auto;
      gap: 15px;
    }

    input {
      padding: 14px;
      border-radius: 12px;
      border: 1px solid rgba(255,255,255,0.1);
      background: rgba(255,255,255,0.05);
      color: white;
      font-size: 16px;
      outline: none;
    }

    input::placeholder {
      color: #8b93ad;
    }

    button {
      background: linear-gradient(135deg, #00d4ff, #0066ff);
      border: none;
      color: white;
      padding: 14px 24px;
      border-radius: 12px;
      cursor: pointer;
      font-size: 16px;
      font-weight: bold;
      transition: 0.3s;
      box-shadow: 0 0 20px rgba(0,212,255,0.3);
    }

    button:hover {
      transform: translateY(-2px);
      box-shadow: 0 0 30px rgba(0,212,255,0.5);
    }

    #list {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
      gap: 20px;
    }

    .book {
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 18px;
      padding: 20px;
      transition: 0.3s;
      backdrop-filter: blur(10px);
    }

    .book:hover {
      transform: translateY(-4px);
      box-shadow: 0 0 25px rgba(0,212,255,0.15);
    }

    .book h3 {
      margin-bottom: 10px;
      color: #00d4ff;
      font-size: 22px;
    }

    .book p {
      color: #c6cbe0;
      margin-bottom: 8px;
      font-size: 15px;
    }

    @media (max-width: 700px) {
      .form-grid {
        grid-template-columns: 1fr;
      }

      h1 {
        font-size: 32px;
      }
    }
  </style>
</head>
<body>

  <div class="container">

    <h1>Track Your Books</h1>
    <p class="subtitle">Your personal digital bookshelf</p>

    <div class="add-book-card">
      <div class="form-grid">
        <input id="title" placeholder="Book title" />
        <input id="author" placeholder="Author" />
        <button onclick="addBook()">Add Book</button>
      </div>
    </div>

    <div id="list"></div>

  </div>

  <script src="/app.js"></script>

</body>
</html>
