<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Favourites</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>
body {
  font-family: 'Poppins', sans-serif;
  margin: 0;
  background: linear-gradient(135deg, #ffe4ec, #fff0f5);
}

header {
  background: linear-gradient(135deg,#ff69b4,#ff1493);
  color: white;
  text-align: center;
  padding: 1.5rem;
}

.container {
  max-width: 900px;
  margin: 30px auto;
  background: white;
  padding: 25px;
  border-radius: 20px;
}

form {
  display: flex;
  gap: 10px;
  flex-wrap: wrap;
}

input, select, button {
  padding: 10px;
  border-radius: 8px;
  border: 1px solid #ffc0cb;
}

button {
  background: linear-gradient(135deg,#ff69b4,#ff1493);
  color: white;
  border: none;
  cursor: pointer;
}

.book {
  display: flex;
  justify-content: space-between;
  padding: 12px;
  border-bottom: 1px solid #ffe4e1;
}

.stars {
  color: #ff69b4;
}
</style>
</head>

<body>

<header>
  <h1>Favourite Books</h1>
</header>
  <nav style="background:#ed76df; padding:15px; position:sticky; top:0; z-index:1000;">
  <div style="max-width:1100px; margin:auto; display:flex; justify-content:space-between; align-items:center; color:white;">
    <strong>Log In</strong>
    <div>
       <a href="index.html" style="color:white; margin:0 10px; text-decoration:none;">Home</a>
      <a href="Genres.html" style="color:white; margin:0 10px; text-decoration:none;">Genres</a>
      <a href="wishlist.html" style="color:white; margin:0 10px; text-decoration:none;">Wishlist</a>
    </div>
  </div>
</nav>

<div class="container">

  <h2>Add Favourite</h2>

  <form id="favForm">
    <input id="title" placeholder="Title" required>
    <input id="author" placeholder="Author" required>

    <select id="rating">
      <option value="0">No Rating</option>
      <option value="1">⭐</option>
      <option value="2">⭐⭐</option>
      <option value="3">⭐⭐⭐</option>
      <option value="4">⭐⭐⭐⭐</option>
      <option value="5">⭐⭐⭐⭐⭐</option>
    </select>

    <button>Add</button>
  </form>

  <div id="list"></div>

</div>

<script>
const form = document.getElementById('favForm');
const list = document.getElementById('list');

// 🔒 completely separate storage key
let favourites = JSON.parse(localStorage.getItem('favourites_page_only')) || [];

function save() {
  localStorage.setItem('favourites_page_only', JSON.stringify(favourites));
}

function render() {
  list.innerHTML = '';

  favourites.forEach((b, i) => {
    const div = document.createElement('div');
    div.className = 'book';

    div.innerHTML = `
      <div>
        <strong>${b.title}</strong> by ${b.author}<br>
        <span class="stars">${'⭐'.repeat(b.rating)}</span>
      </div>
      <button onclick="removeFav(${i})">Remove</button>
    `;

    list.appendChild(div);
  });
}

function removeFav(i) {
  favourites.splice(i, 1);
  save();
  render();
}

form.onsubmit = (e) => {
  e.preventDefault();

  const fav = {
    title: title.value,
    author: author.value,
    rating: parseInt(rating.value)
  };

  favourites.push(fav);
  save();
  render();
  form.reset();
};

render();
</script>

</body>
</html>
